<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>次方根號計算機</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .result-box { margin-top: 20px; font-weight: bold; color: blue; }
    </style>
</head>
<body>
    <h2>次方/根號 運算表單</h2>
   
    <form id="calcForm">
        數字 x：
        <input type="number" id="x_val" value="  ">
        <br><br>
        運算符號：
        <select id="opt">
            <option value="∧">∧ (次方)</option>
            <option value="✓">✓ (根號)</option>
        </select>
        <br><br>
        數字 y：
        <input type="number" id="y_val" value=" ">
        <br><br>
        <input type="button" value="計算結果" onclick="calculate()">
    </form>

    <div class="result-box" id="display"></div>

    <script>
        function calculate() {
            // 取得輸入值
            const x = parseFloat(document.getElementById('x_val').value);
            const opt = document.getElementById('opt').value;
            const y = parseFloat(document.getElementById('y_val').value);
            const display = document.getElementById('display');
            let result;

            // 執行 Python 檔案中的邏輯
            if (opt === "∧") {
                result = Math.pow(x, y);
            } else if (opt === "✓") {
                if (y === 0) {
                    result = "數學不能開0次方根";
                } else {
                    result = Math.pow(x, 1/y);
                }
            } else {
                result = "請選擇運算符號";
            }

            display.innerHTML = "計算結果為：" + result;
        }
    </script>
</body>
</html>
